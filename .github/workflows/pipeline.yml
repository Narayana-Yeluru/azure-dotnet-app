name: Deploy .NET App to Azure

on:
  workflow_dispatch:

jobs:

  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - uses: hashicorp/setup-terraform@v3

      - run: terraform init
      - run: terraform validate
      - run: terraform plan -var-file=../env/dev.tfvars
      - run: terraform apply -auto-approve -var-file=../env/dev.tfvars

  deploy:
    needs: terraform
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          path: src/HelloWorld

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '7.0.x'

      - name: Restore dependencies
        run: dotnet restore src/HelloWorld/HelloWorld.csproj

      - name: Build app
        run: dotnet build --configuration Release src/HelloWorld/HelloWorld.csproj

      - name: Publish app
        run: dotnet publish -c Release -o ./publish src/HelloWorld/HelloWorld.csproj

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ steps.terraform.outputs.webapp_url }}
          slot-name: production
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE }}
          package: ./publish
